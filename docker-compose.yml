name: clinic-admin-platform

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_admin}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clinic-net

  # Dedicated, disposable test-only database for the backend integration
  # test suite. Never started by a plain `docker compose up` - only via
  # `docker compose --profile test up -d postgres-test` (see
  # .ai-workflow/scripts/run-local-integration-tests.ps1, the only script
  # allowed to authorize destructive test setup against it). Uses tmpfs, not
  # a named volume: it never persists and never shares storage with the
  # `postgres` service above. Keep POSTGRES_DB/credentials here in sync with
  # run-local-integration-tests.ps1's constants if either changes.
  postgres-test:
    image: postgres:17-alpine
    restart: "no"
    profiles: ["test"]
    environment:
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
      POSTGRES_DB: clinic_admin_test
    ports:
      - "5555:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d clinic_admin_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clinic-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clinic-net

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - clinic-net

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD:-clinic}@postgres:5432/${POSTGRES_DB:-clinic_admin}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - clinic-net

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - clinic-net

volumes:
  postgres-data:
  redis-data:
  qdrant-data:

networks:
  clinic-net:
    driver: bridge
